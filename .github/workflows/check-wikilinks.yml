name: Check Wikilinks

on:
  pull_request:
    paths:
      - '**.md'
  push:
    branches:
      - main
    paths:
      - '**.md'

jobs:
  wikilinks:
    name: Broken wikilink check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find broken wikilinks
        run: |
          set -euo pipefail

          ERRORS=0

          # Files to skip entirely when scanning for wikilinks.
          # These contain literal [[wikilink]] examples in prose, not real links.
          SCAN_SKIP=(
            "./README.md"
            "./CONTRIBUTING.md"
          )

          # Build a list of all note basenames (without extension)
          # and full relative paths (without extension) for matching.
          # Also build a set of folder paths so [[Folder/]] links resolve.
          mapfile -t ALL_FILES < <(find . -name '*.md' \
            -not -path './.git/*' \
            -not -name '.gitkeep')

          declare -A BASENAMES
          declare -A RELPATHS
          declare -A FOLDERS

          for f in "${ALL_FILES[@]}"; do
            base=$(basename "$f" .md)
            relpath="${f#./}"
            relpath_noext="${relpath%.md}"
            BASENAMES["$base"]=1
            RELPATHS["$relpath_noext"]=1
            # Register every parent directory so folder wikilinks resolve
            dir=$(dirname "$relpath")
            while [[ "$dir" != "." && "$dir" != "" ]]; do
              FOLDERS["$dir"]=1
              dir=$(dirname "$dir")
            done
          done

          # Scan every markdown file for [[wikilinks]]
          for f in "${ALL_FILES[@]}"; do
            # Skip files that should not be scanned
            SKIP=0
            for skip_file in "${SCAN_SKIP[@]}"; do
              if [[ "$f" == "$skip_file" ]]; then
                SKIP=1
                break
              fi
            done
            [ "$SKIP" -eq 1 ] && continue

            # Extract wikilink targets, strip aliases (|) and heading anchors (#)
            mapfile -t LINKS < <(grep -oP '(?<=\[\[)[^\]]+' "$f" | sed 's/[|#].*//' | sort -u)

            for link in "${LINKS[@]}"; do
              # Skip empty
              [ -z "$link" ] && continue

              # Normalize: trim whitespace
              link=$(echo "$link" | xargs)

              # Skip Templater expressions: links containing {{ or {{
              if [[ "$link" == *'{{'* || "$link" == *'}}' ]]; then
                continue
              fi

              # Skip placeholder links: all-caps words or known template placeholders
              if echo "$link" | grep -qP '^[A-Z][a-z]+ [A-Z][a-z]+$'; then
                # Only skip if it looks like a pure placeholder (two generic title-case words
                # with no path separator)
                if [[ "$link" != */* ]]; then
                  # Check it's a known placeholder pattern
                  case "$link" in
                    "Area Name"|"Project Name"|"Your Name"|"Note Title")
                      continue
                      ;;
                  esac
                fi
              fi

              # Strip trailing slash (folder links like [[Projects/Foo/Status/]])
              link_clean="${link%/}"

              # Check basename match OR full relative path match OR folder match
              base=$(basename "$link_clean")
              relpath_noext="$link_clean"

              if [[ -n "${BASENAMES[$base]:-}" || -n "${RELPATHS[$relpath_noext]:-}" || -n "${FOLDERS[$link_clean]:-}" ]]; then
                : # resolved
              else
                echo "::error file=$f::Broken wikilink: [[$link]]"
                ERRORS=$((ERRORS + 1))
              fi
            done
          done

          if [ "$ERRORS" -gt 0 ]; then
            echo ""
            echo "$ERRORS broken wikilink(s) found. Fix them or create the missing notes."
            exit 1
          else
            echo "All wikilinks resolved."
          fi
